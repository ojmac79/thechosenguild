<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Chosen — Discord</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background:
          radial-gradient(circle at 20% -10%, rgba(100, 126, 201, 0.36) 0%, rgba(12, 16, 32, 0) 45%),
          radial-gradient(circle at 85% 12%, rgba(237, 186, 99, 0.18) 0%, rgba(8, 10, 20, 0) 38%),
          linear-gradient(160deg, #03040a 0%, #0a1020 48%, #05070d 100%);
        overflow: hidden;
      }

      .discord-frame {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(226, 183, 104, 0.25);
        border-radius: 0;
        overflow: hidden;
        box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.6);
      }

      widgetbot {
        display: block;
        width: 100%;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="discord-frame">
      <widgetbot
        server="1525890254169440256"
        width="100%"
        height="100%"
      ></widgetbot>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@widgetbot/html-embed"></script>
  </body>
</html>
