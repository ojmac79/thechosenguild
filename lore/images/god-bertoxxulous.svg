<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080c00"/>
      <stop offset="100%" stop-color="#0c1000"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,120)" fill="#80b030" opacity="0.8" filter="url(#glow)">
    <!-- cranium -->
    <ellipse cx="0" cy="-20" rx="55" ry="55"/>
    <!-- jaw -->
    <rect x="-30" y="20" width="60" height="28" rx="5"/>
    <!-- eye sockets -->
    <ellipse cx="-18" cy="-25" rx="14" ry="16" fill="black" opacity="0.8"/>
    <ellipse cx="18"  cy="-25" rx="14" ry="16" fill="black" opacity="0.8"/>
    <!-- nose cavity -->
    <path d="M-7,0 L0,-10 L7,0 L3,10 L-3,10 Z" fill="black" opacity="0.7"/>
    <!-- teeth -->
    <rect x="-28" y="28" width="10" height="16" fill="black" opacity="0.4"/>
    <rect x="-14" y="28" width="10" height="18" fill="black" opacity="0.4"/>
    <rect x="0"   y="28" width="10" height="18" fill="black" opacity="0.4"/>
    <rect x="14"  y="28" width="10" height="16" fill="black" opacity="0.4"/>
  </g>
  <!-- plague pustules/spores -->
  <g filter="url(#glow)" opacity="0.6">
    <circle cx="160" cy="90"  r="12" fill="#708010"/>
    <circle cx="440" cy="85"  r="10" fill="#708010"/>
    <circle cx="100" cy="160" r="8"  fill="#708010"/>
    <circle cx="500" cy="155" r="9"  fill="#708010"/>
    <circle cx="200" cy="170" r="7"  fill="#90a020"/>
    <circle cx="400" cy="165" r="8"  fill="#90a020"/>
  </g>
  <!-- rot tendrils -->
  <g stroke="#506010" stroke-width="3" fill="none" opacity="0.5">
    <path d="M160,90 Q200,130 240,120"/>
    <path d="M440,85 Q400,130 360,120"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#90c020" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#90c020" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#90c020" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#90c020" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#90c020" text-anchor="middle" filter="url(#glow)">Bertoxxulous</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#90c020" text-anchor="middle" opacity="0.65">The Plaguebringer · Plane of Disease</text>

</svg>
