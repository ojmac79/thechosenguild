<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#040c04"/>
      <stop offset="100%" stop-color="#070f07"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
  <!-- forest path -->
  <g opacity="0.7">
    <!-- path -->
    <path d="M280,280 Q290,200 300,120 Q310,200 320,280 Z" fill="#3a2a10" opacity="0.6"/>
    <!-- trees -->
      <g transform="translate(130,180)" opacity="0.85">
    <!-- trunk -->
    <rect x="-10" y="-20" width="20" height="60" fill="#3a2510"/>
    <!-- roots -->
    <path d="M-10,40 Q-30,55 -40,50" stroke="#3a2510" stroke-width="6" fill="none"/>
    <path d="M10,40 Q30,55 40,50" stroke="#3a2510" stroke-width="6" fill="none"/>
    <!-- canopy layers -->
    <ellipse cx="0" cy="-80" rx="90" ry="60" fill="#1a4a15"/>
    <ellipse cx="0" cy="-110" rx="70" ry="50" fill="#1a4a15"/>
    <ellipse cx="0" cy="-135" rx="50" ry="38" fill="#1a4a15" opacity="0.9"/>
    <!-- light on leaves -->
    <ellipse cx="-20" cy="-90" rx="25" ry="18" fill="#4a7c30" opacity="0.6"/>
    <ellipse cx="25"  cy="-105" rx="20" ry="15" fill="#4a7c30" opacity="0.6"/>
  </g>
      <g transform="translate(480,185)" opacity="0.85">
    <!-- trunk -->
    <rect x="-10" y="-20" width="20" height="60" fill="#3a2510"/>
    <!-- roots -->
    <path d="M-10,40 Q-30,55 -40,50" stroke="#3a2510" stroke-width="6" fill="none"/>
    <path d="M10,40 Q30,55 40,50" stroke="#3a2510" stroke-width="6" fill="none"/>
    <!-- canopy layers -->
    <ellipse cx="0" cy="-80" rx="90" ry="60" fill="#1a4a15"/>
    <ellipse cx="0" cy="-110" rx="70" ry="50" fill="#1a4a15"/>
    <ellipse cx="0" cy="-135" rx="50" ry="38" fill="#1a4a15" opacity="0.9"/>
    <!-- light on leaves -->
    <ellipse cx="-20" cy="-90" rx="25" ry="18" fill="#4a7c30" opacity="0.6"/>
    <ellipse cx="25"  cy="-105" rx="20" ry="15" fill="#4a7c30" opacity="0.6"/>
  </g>
  </g>
  <!-- twilight sky -->
  <radialGradient id="twilight" cx="50%" cy="0%" r="70%">
    <stop offset="0%" stop-color="#6040a0" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="600" height="200" fill="url(#twilight)"/>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#a0d0a0" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#a0d0a0" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#a0d0a0" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#a0d0a0" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#a0d0a0" text-anchor="middle" filter="url(#glow)">Half Elves</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#a0d0a0" text-anchor="middle" opacity="0.65">Wanderers of Antonica &amp; Faydwer</text>

</svg>
