<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#050c00"/>
      <stop offset="100%" stop-color="#080e00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,115) scale(1.0)" fill="#204010" opacity="0.85" filter="url(#glow)">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="80" ry="35"/>
    <!-- neck -->
    <ellipse cx="-55" cy="-25" rx="30" ry="18" transform="rotate(-20 -55 -25)"/>
    <!-- head -->
    <ellipse cx="-90" cy="-48" rx="22" ry="14" transform="rotate(-30 -90 -48)"/>
    <!-- snout -->
    <ellipse cx="-108" cy="-52" rx="14" ry="7" transform="rotate(-15 -108 -52)"/>
    <!-- eye -->
    <circle cx="-95" cy="-53" r="3" fill="gold" opacity="0.9"/>
    <!-- tail -->
    <path d="M70,10 Q120,30 150,15 Q170,5 160,-10 Q145,-20 130,0 Q115,15 90,5 Z"/>
    <!-- left wing -->
    <path d="M-20,-20 Q-80,-90 -120,-100 Q-60,-60 -10,-10 Z"/>
    <path d="M10,-30 Q-20,-110 -50,-140 Q-20,-90 20,-25 Z"/>
    <!-- right wing -->
    <path d="M20,-20 Q80,-90 110,-95 Q55,-55 15,-10 Z"/>
    <path d="M30,-28 Q70,-110 100,-130 Q60,-85 25,-22 Z"/>
    <!-- legs -->
    <path d="M-20,25 Q-25,55 -35,70 L-30,72 Q-20,60 -15,27 Z"/>
    <path d="M20,28 Q22,58 15,73 L20,73 Q28,60 25,27 Z"/>
    <!-- claws left -->
    <path d="M-35,70 L-42,80 M-35,70 L-38,82 M-35,70 L-28,80"/>
    <!-- claws right -->
    <path d="M15,73 L8,83 M15,73 L14,85 M15,73 L22,82"/>
  </g>
  <!-- poison aura -->
  <radialGradient id="poisonaura" cx="50%" cy="42%" r="50%">
    <stop offset="0%" stop-color="#60c030" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="600" height="280" fill="url(#poisonaura)"/>
  <!-- ruins of Sebilis -->
  <g fill="#1a2a10" opacity="0.5">
    <rect x="40"  y="190" width="20" height="80"/>
    <rect x="80"  y="210" width="18" height="60"/>
    <rect x="490" y="195" width="20" height="75"/>
    <rect x="530" y="215" width="18" height="55"/>
  </g>
  <!-- poison drips -->
  <g fill="#80d040" opacity="0.4" filter="url(#glow)">
    <circle cx="200" cy="180" r="5"/>
    <circle cx="400" cy="185" r="4"/>
    <circle cx="300" cy="190" r="5"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#70c040" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#70c040" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#70c040" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#70c040" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#70c040" text-anchor="middle" filter="url(#glow)">Trakanon</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#70c040" text-anchor="middle" opacity="0.65">The Ancient One · Undead Poison Dragon</text>

</svg>
