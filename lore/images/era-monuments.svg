<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#100c08"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,170)" fill="#5a4830" opacity="0.8">
    <!-- broken columns -->
    <rect x="-110" y="-100" width="28" height="130"/>
    <rect x="-90"  y="-120" width="28" height="20"/>  <!-- capital fragment -->
    <rect x="-50"  y="-80"  width="28" height="110"/>
    <rect x="30"   y="-90"  width="28" height="120"/>
    <rect x="90"   y="-70"  width="28" height="100"/>
    <rect x="80"   y="-90"  width="40" height="20"/>  <!-- capital -->
    <!-- fallen column -->
    <rect x="-20" y="10" width="130" height="22" transform="rotate(-5 60 20)"/>
    <!-- rubble -->
    <polygon points="-140,30 -100,30 -115,0"/>
    <polygon points="130,20 160,20 145,-5"/>
    <polygon points="-10,30 20,30 5,10"/>
    <!-- archway remnant -->
    <rect x="-25" y="-110" width="15" height="110"/>
    <rect x="10"  y="-110" width="15" height="110"/>
    <path d="M-25,-110 Q0,-135 25,-110" fill="none" stroke="#5a4830" stroke-width="15"/>
  </g>
  <!-- ground -->
  <rect x="0" y="210" width="600" height="70" fill="#2a1e10" opacity="0.5"/>
  <!-- golden sunlight -->
  <radialGradient id="sunlight" cx="80%" cy="10%" r="60%">
    <stop offset="0%" stop-color="#ffd000" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="600" height="280" fill="url(#sunlight)"/>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#d4a060" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#d4a060" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#d4a060" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#d4a060" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#d4a060" text-anchor="middle" filter="url(#glow)">The Age of Monuments</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#d4a060" text-anchor="middle" opacity="0.65">Era IV · Rise of Mortal Civilizations</text>

</svg>
