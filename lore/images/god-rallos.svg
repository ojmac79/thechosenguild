<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#100500"/>
      <stop offset="100%" stop-color="#180800"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,120)" filter="url(#glow)" opacity="0.85">
    <!-- sword 1 -->
    <g stroke="#e06040" stroke-width="6" fill="none" transform="rotate(45)">
      <line x1="0" y1="-100" x2="0" y2="70"/>
      <line x1="-25" y1="35" x2="25" y2="35"/>
      <rect x="-5" y="60" width="10" height="20" fill="#e06040" stroke="none"/>
    </g>
    <!-- sword 2 -->
    <g stroke="#e06040" stroke-width="6" fill="none" transform="rotate(-45)">
      <line x1="0" y1="-100" x2="0" y2="70"/>
      <line x1="-25" y1="35" x2="25" y2="35"/>
      <rect x="-5" y="60" width="10" height="20" fill="#e06040" stroke="none"/>
    </g>
  </g>
  <!-- war banner -->
  <rect x="287" y="40" width="26" height="14" fill="#c03010"/>
  <rect x="286" y="54" width="28" height="80" fill="#c03010" opacity="0.8"/>
  <!-- axes -->
  <g transform="translate(300,120)" fill="#a04030" opacity="0.6">
    <path d="M-80,-60 Q-100,-80 -80,-100 Q-60,-90 -70,-60 Z" transform="rotate(30)"/>
    <path d="M80,-60 Q100,-80 80,-100 Q60,-90 70,-60 Z" transform="rotate(-30)"/>
  </g>
  <!-- blood drops -->
  <g fill="#cc2010" opacity="0.5">
    <circle cx="150" cy="160" r="5"/>
    <circle cx="200" cy="180" r="4"/>
    <circle cx="400" cy="155" r="5"/>
    <circle cx="450" cy="175" r="4"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#e04020" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#e04020" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#e04020" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#e04020" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#e04020" text-anchor="middle" filter="url(#glow)">Rallos Zek</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#e04020" text-anchor="middle" opacity="0.65">The Warlord · Plane of War</text>

</svg>
