<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#030a02"/>
      <stop offset="100%" stop-color="#050e03"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g opacity="0.8">
    <!-- massive tree trunk -->
    <rect x="270" y="100" width="60" height="200" fill="#6a4a20"/>
    <!-- branches -->
    <path d="M300,150 Q200,100 150,120" stroke="#6a4a20" stroke-width="20" fill="none"/>
    <path d="M300,130 Q400,80  450,100" stroke="#6a4a20" stroke-width="18" fill="none"/>
    <path d="M300,180 Q180,160 140,185" stroke="#6a4a20" stroke-width="16" fill="none"/>
    <path d="M300,170 Q420,150 460,170" stroke="#6a4a20" stroke-width="15" fill="none"/>
    <!-- leaf canopy -->
    <ellipse cx="300" cy="60" rx="200" ry="80" fill="#1a5a10" opacity="0.7"/>
    <ellipse cx="200" cy="90" rx="80"  ry="50" fill="#1a5a10" opacity="0.6"/>
    <ellipse cx="420" cy="80" rx="80"  ry="50" fill="#1a5a10" opacity="0.6"/>
    <!-- platforms -->
    <rect x="100" y="115" width="120" height="14" rx="3" fill="#6a4a20"/>
    <rect x="380" y="95"  width="110" height="14" rx="3" fill="#6a4a20"/>
    <rect x="110" y="175" width="100" height="12" rx="3" fill="#6a4a20"/>
    <rect x="390" y="160" width="95"  height="12" rx="3" fill="#6a4a20"/>
    <!-- huts on platforms -->
    <g fill="#7a5040">
      <rect x="120" y="95" width="40" height="22"/>
      <polygon points="120,95 140,78 160,95"/>
      <rect x="395" y="75" width="38" height="22"/>
      <polygon points="395,75 414,58 433,75"/>
    </g>
  </g>
  <!-- forest floor -->
  <rect x="0" y="255" width="600" height="25" fill="#0a1a05" opacity="0.7"/>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#90d050" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#90d050" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#90d050" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#90d050" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#90d050" text-anchor="middle" filter="url(#glow)">Kelethin</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#90d050" text-anchor="middle" opacity="0.65">City of the Trees · Greater Faydark</text>

</svg>
