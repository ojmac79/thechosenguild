<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080818"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,125)" filter="url(#glow)" opacity="0.85">
    <!-- sword 1 -->
    <g stroke="#d0d8ff" stroke-width="6" fill="none" transform="rotate(45)">
      <line x1="0" y1="-100" x2="0" y2="70"/>
      <line x1="-25" y1="35" x2="25" y2="35"/>
      <rect x="-5" y="60" width="10" height="20" fill="#d0d8ff" stroke="none"/>
    </g>
    <!-- sword 2 -->
    <g stroke="#d0d8ff" stroke-width="6" fill="none" transform="rotate(-45)">
      <line x1="0" y1="-100" x2="0" y2="70"/>
      <line x1="-25" y1="35" x2="25" y2="35"/>
      <rect x="-5" y="60" width="10" height="20" fill="#d0d8ff" stroke="none"/>
    </g>
  </g>
  <!-- armor glow -->
  <radialGradient id="valorglow" cx="50%" cy="45%" r="35%">
    <stop offset="0%" stop-color="#8090d0" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="600" height="280" fill="url(#valorglow)"/>
  <!-- paladin shield -->
  <path d="M300,60 L340,80 L340,115 Q340,135 300,150 Q260,135 260,115 L260,80 Z"
        fill="none" stroke="#d0d8ff" stroke-width="2.5" opacity="0.6"/>
  <text x="300" y="118" font-family="serif" font-size="18" font-weight="bold"
        fill="#d0d8ff" text-anchor="middle" opacity="0.55">✦</text>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#a0b8f0" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#a0b8f0" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#a0b8f0" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#a0b8f0" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#a0b8f0" text-anchor="middle" filter="url(#glow)">Mithaniel Marr</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#a0b8f0" text-anchor="middle" opacity="0.65">The Truthbringer · Plane of Valor</text>

</svg>
