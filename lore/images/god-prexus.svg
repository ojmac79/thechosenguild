<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#030a14"/>
      <stop offset="100%" stop-color="#05101e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,160)" opacity="0.8">
    <!-- waves -->
    <path d="M-250,0 Q-200,-35 -150,0 Q-100,35 -50,0 Q0,-35 50,0 Q100,35 150,0 Q200,-35 250,0 L250,50 L-250,50 Z" fill="#1060a0"/>
    <path d="M-250,-20 Q-200,-55 -150,-20 Q-100,15 -50,-20 Q0,-55 50,-20 Q100,15 150,-20 Q200,-55 250,-20"
          fill="none" stroke="#5bc8e8" stroke-width="3" opacity="0.6"/>
    <path d="M-250,20 Q-175,-10 -100,20 Q-25,50 50,20 Q125,-10 200,20"
          fill="none" stroke="#7de0f5" stroke-width="2" opacity="0.4"/>
    <!-- depths -->
    <ellipse cx="0" cy="30" rx="200" ry="30" fill="#0a3d52" opacity="0.5"/>
  </g>
  <!-- underwater rays -->
  <g stroke="#4ab0d0" stroke-width="2" opacity="0.2">
    <line x1="300" y1="0" x2="100" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="300" y1="0" x2="500" y2="200"/>
    <line x1="300" y1="0" x2="150" y2="180"/>
    <line x1="300" y1="0" x2="450" y2="180"/>
  </g>
  <!-- trident symbol -->
  <g transform="translate(300,110)" stroke="#60c0e0" stroke-width="4" fill="none" opacity="0.7">
    <line x1="0" y1="-80" x2="0" y2="80"/>
    <line x1="-30" y1="-55" x2="-30" y2="-25"/>
    <line x1="30"  y1="-55" x2="30"  y2="-25"/>
    <path d="M-30,-55 Q-30,-75 0,-75 Q30,-75 30,-55"/>
    <path d="M-32,-24 Q-40,-10 -32,5"/>
    <path d="M32,-24 Q40,-10 32,5"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#3090c0" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#3090c0" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#3090c0" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#3090c0" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#3090c0" text-anchor="middle" filter="url(#glow)">Prexus</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#3090c0" text-anchor="middle" opacity="0.65">The Oceanlord · Plane of Water</text>

</svg>
