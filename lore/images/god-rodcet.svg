<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#050b10"/>
      <stop offset="100%" stop-color="#080f18"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
  <!-- healing cross -->
  <rect x="270" y="50"  width="60" height="160" rx="8" fill="#50c0e0" opacity="0.75" filter="url(#glow)"/>
  <rect x="200" y="105" width="200" height="60"  rx="8" fill="#50c0e0" opacity="0.75" filter="url(#glow)"/>
  <!-- radiant glow -->
  <radialGradient id="healinglight" cx="50%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#a0ffff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="600" height="280" fill="url(#healinglight)"/>
  <!-- light rays -->
  <g stroke="#70e0f0" stroke-width="1" opacity="0.3">
    <line x1="300" y1="130" x2="50"  y2="20"/>
    <line x1="300" y1="130" x2="550" y2="20"/>
    <line x1="300" y1="130" x2="50"  y2="240"/>
    <line x1="300" y1="130" x2="550" y2="240"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#80e0ff" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#80e0ff" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#80e0ff" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#80e0ff" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#80e0ff" text-anchor="middle" filter="url(#glow)">Rodcet Nife</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#80e0ff" text-anchor="middle" opacity="0.65">The Prime Healer · Plane of Health</text>

</svg>
