<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060a10"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g opacity="0.85">
    <!-- wall -->
    <rect x="0" y="80" width="600" height="200" fill="#705a30"/>
    <!-- battlements top -->
    <rect x="0"   y="65" width="50" height="18"/>
    <rect x="60"  y="65" width="50" height="18"/>
    <rect x="120" y="65" width="50" height="18"/>
    <rect x="180" y="65" width="50" height="18"/>
    <rect x="240" y="65" width="50" height="18"/>
    <rect x="300" y="65" width="50" height="18"/>
    <rect x="360" y="65" width="50" height="18"/>
    <rect x="420" y="65" width="50" height="18"/>
    <rect x="480" y="65" width="50" height="18"/>
    <rect x="540" y="65" width="60" height="18"/>
    <g fill="#705a30">
      <rect x="0"   y="65" width="50" height="18"/>
      <rect x="60"  y="65" width="50" height="18"/>
      <rect x="120" y="65" width="50" height="18"/>
      <rect x="180" y="65" width="50" height="18"/>
      <rect x="240" y="65" width="50" height="18"/>
      <rect x="300" y="65" width="50" height="18"/>
      <rect x="360" y="65" width="50" height="18"/>
      <rect x="420" y="65" width="50" height="18"/>
      <rect x="480" y="65" width="50" height="18"/>
      <rect x="540" y="65" width="60" height="18"/>
    </g>
    <!-- gate arch -->
    <path d="M220,280 L220,130 Q300,80 380,130 L380,280 Z" fill="#1a1208"/>
    <path d="M230,280 L230,135 Q300,90 370,135 L370,280 Z" fill="#0a0a08"/>
    <!-- portcullis bars -->
    <g stroke="#705a30" stroke-width="5" opacity="0.6">
      <line x1="235" y1="130" x2="235" y2="280"/>
      <line x1="255" y1="125" x2="255" y2="280"/>
      <line x1="275" y1="120" x2="275" y2="280"/>
      <line x1="295" y1="118" x2="295" y2="280"/>
      <line x1="315" y1="118" x2="315" y2="280"/>
      <line x1="335" y1="120" x2="335" y2="280"/>
      <line x1="355" y1="125" x2="355" y2="280"/>
      <line x1="230" y1="160" x2="370" y2="160"/>
      <line x1="230" y1="195" x2="370" y2="195"/>
      <line x1="230" y1="230" x2="370" y2="230"/>
    </g>
    <!-- torches -->
    <rect x="205" y="105" width="12" height="30" fill="#8b7355"/>
    <ellipse cx="211" cy="100" rx="8" ry="12" fill="#ffd060" opacity="0.7" filter="url(#glow)"/>
    <rect x="383" y="105" width="12" height="30" fill="#8b7355"/>
    <ellipse cx="389" cy="100" rx="8" ry="12" fill="#ffd060" opacity="0.7" filter="url(#glow)"/>
  </g>
  <!-- blue sky/sea backdrop -->
  <radialGradient id="qeynoskyglow" cx="50%" cy="20%" r="60%">
    <stop offset="0%" stop-color="#4080c0" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="600" height="200" fill="url(#qeynoskyglow)"/>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#d4c060" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#d4c060" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#d4c060" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#d4c060" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#d4c060" text-anchor="middle" filter="url(#glow)">Qeynos</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#d4c060" text-anchor="middle" opacity="0.65">City of Justice · Western Antonica</text>

</svg>
