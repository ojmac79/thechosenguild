<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#030810"/>
      <stop offset="100%" stop-color="#050c18"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,115) scale(1.0)" fill="#1a4060" opacity="0.85" filter="url(#glow)">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="80" ry="35"/>
    <!-- neck -->
    <ellipse cx="-55" cy="-25" rx="30" ry="18" transform="rotate(-20 -55 -25)"/>
    <!-- head -->
    <ellipse cx="-90" cy="-48" rx="22" ry="14" transform="rotate(-30 -90 -48)"/>
    <!-- snout -->
    <ellipse cx="-108" cy="-52" rx="14" ry="7" transform="rotate(-15 -108 -52)"/>
    <!-- eye -->
    <circle cx="-95" cy="-53" r="3" fill="gold" opacity="0.9"/>
    <!-- tail -->
    <path d="M70,10 Q120,30 150,15 Q170,5 160,-10 Q145,-20 130,0 Q115,15 90,5 Z"/>
    <!-- left wing -->
    <path d="M-20,-20 Q-80,-90 -120,-100 Q-60,-60 -10,-10 Z"/>
    <path d="M10,-30 Q-20,-110 -50,-140 Q-20,-90 20,-25 Z"/>
    <!-- right wing -->
    <path d="M20,-20 Q80,-90 110,-95 Q55,-55 15,-10 Z"/>
    <path d="M30,-28 Q70,-110 100,-130 Q60,-85 25,-22 Z"/>
    <!-- legs -->
    <path d="M-20,25 Q-25,55 -35,70 L-30,72 Q-20,60 -15,27 Z"/>
    <path d="M20,28 Q22,58 15,73 L20,73 Q28,60 25,27 Z"/>
    <!-- claws left -->
    <path d="M-35,70 L-42,80 M-35,70 L-38,82 M-35,70 L-28,80"/>
    <!-- claws right -->
    <path d="M15,73 L8,83 M15,73 L14,85 M15,73 L22,82"/>
  </g>
    <g transform="translate(300,115)" stroke="#a0d0f0" stroke-width="4" fill="none" filter="url(#glow)" opacity="0.8">
    <!-- main arms -->
    <line x1="0" y1="-85" x2="0" y2="85"/>
    <line x1="-85" y1="0" x2="85" y2="0"/>
    <line x1="-60" y1="-60" x2="60" y2="60"/>
    <line x1="60" y1="-60" x2="-60" y2="60"/>
    <!-- branch decorations -->
    <line x1="-15" y1="-51" x2="0" y2="-42"/>
    <line x1="15"  y1="-51" x2="0" y2="-42"/>
    <line x1="-15" y1="51" x2="0" y2="42"/>
    <line x1="15"  y1="51" x2="0" y2="42"/>
    <line x1="-51" y1="-15" x2="-42" y2="0"/>
    <line x1="-51" y1="15" x2="-42" y2="0"/>
    <line x1="51" y1="-15" x2="42" y2="0"/>
    <line x1="51" y1="15" x2="42" y2="0"/>
    <!-- center -->
    <circle cx="0" cy="0" r="10" fill="#a0d0f0" opacity="0.5"/>
  </g>
  <!-- ice cave walls -->
    <g opacity="0.6">
    <polygon points="0,230 80,130 160,230" fill="#0a1a2a"/>
    <polygon points="100,230 200,100 300,230" fill="#0a1a2a"/>
    <polygon points="250,230 350,120 430,230" fill="#0a1a2a"/>
    <polygon points="380,230 480,90 580,230" fill="#0a1a2a"/>
    <polygon points="480,230 560,140  600,230" fill="#0a1a2a"/>
    <!-- snow caps -->
    <polygon points="75,135  80,130 85,135"  fill="white" opacity="0.7"/>
    <polygon points="193,107 200,100 207,107" fill="white" opacity="0.7"/>
    <polygon points="344,126 350,120 356,126" fill="white" opacity="0.7"/>
    <polygon points="473,97 480,90 487,97" fill="white" opacity="0.7"/>
  </g>
  <!-- ice crystal reflections -->
  <g fill="#80c0f0" opacity="0.15">
    <polygon points="80,200 100,160 120,200"/>
    <polygon points="470,195 490,155 510,195"/>
    <polygon points="200,210 215,175 230,210"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#c0e8ff" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#c0e8ff" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#c0e8ff" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#c0e8ff" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#c0e8ff" text-anchor="middle" filter="url(#glow)">Lady Vox</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#c0e8ff" text-anchor="middle" opacity="0.65">The Icefang · Permafrost Caverns</text>

</svg>
