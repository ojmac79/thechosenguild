<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080c18"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,110)" filter="url(#glow)" opacity="0.85">
    <path d="M20,-100 L-15,-15 L15,-15 L-25,100" stroke="#f0f8ff" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M20,-100 L-15,-15 L15,-15 L-25,100" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- glow halo -->
    <path d="M20,-100 L-15,-15 L15,-15 L-25,100" stroke="#f0f8ff" stroke-width="25" fill="none" opacity="0.15"/>
    <!-- storm clouds -->
    <ellipse cx="-60" cy="-90" rx="50" ry="30" fill="#3a4a5a" opacity="0.6"/>
    <ellipse cx="40"  cy="-80" rx="55" ry="28" fill="#4a5a6a" opacity="0.55"/>
    <ellipse cx="-10" cy="-100" rx="60" ry="35" fill="#2a3a4a" opacity="0.7"/>
  </g>
  <!-- storm clouds extra -->
  <ellipse cx="120" cy="60" rx="80" ry="35" fill="#2a3a50" opacity="0.6"/>
  <ellipse cx="500" cy="50" rx="70" ry="30" fill="#2a3a50" opacity="0.5"/>
  <!-- rain streaks -->
  <g stroke="#90b8d0" stroke-width="1" opacity="0.3">
    <line x1="80"  y1="130" x2="60"  y2="200"/>
    <line x1="140" y1="140" x2="120" y2="210"/>
    <line x1="450" y1="130" x2="430" y2="200"/>
    <line x1="510" y1="140" x2="490" y2="210"/>
    <line x1="180" y1="150" x2="160" y2="220"/>
    <line x1="420" y1="145" x2="400" y2="215"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#d0e8ff" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#d0e8ff" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#d0e8ff" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#d0e8ff" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#d0e8ff" text-anchor="middle" filter="url(#glow)">Karana</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#d0e8ff" text-anchor="middle" opacity="0.65">The Rainkeeper · Plane of Sky</text>

</svg>
