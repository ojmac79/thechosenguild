<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0800"/>
      <stop offset="100%" stop-color="#120e00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,165)" fill="#605040" opacity="0.8">
    <!-- main keep -->
    <rect x="-60" y="-90" width="120" height="110"/>
    <!-- battlements -->
    <rect x="-60" y="-105" width="20" height="18"/>
    <rect x="-30" y="-105" width="20" height="18"/>
    <rect x="0"   y="-105" width="20" height="18"/>
    <rect x="30"  y="-105" width="20" height="18"/>
    <!-- flanking towers -->
    <rect x="-105" y="-75" width="45" height="95"/>
    <rect x="60"   y="-75" width="45" height="95"/>
    <!-- tower battlements left -->
    <rect x="-105" y="-90" width="14" height="18"/>
    <rect x="-83"  y="-90" width="14" height="18"/>
    <!-- tower battlements right -->
    <rect x="60"   y="-90" width="14" height="18"/>
    <rect x="82"   y="-90" width="14" height="18"/>
    <!-- gate -->
    <path d="M-22,20 Q-22,-15 0,-15 Q22,-15 22,20 Z" fill="#605040" opacity="0.3"/>
    <!-- windows -->
    <path d="M-20,-60 Q-20,-75 -10,-75 Q0,-75 0,-60 Z" fill="gold" opacity="0.4"/>
    <path d="M10,-60 Q10,-75 20,-75 Q30,-75 30,-60 Z" fill="gold" opacity="0.4"/>
  </g>
    <g opacity="0.6">
    <polygon points="0,210 80,110 160,210" fill="#403020"/>
    <polygon points="100,210 200,80 300,210" fill="#403020"/>
    <polygon points="250,210 350,100 430,210" fill="#403020"/>
    <polygon points="380,210 480,70 580,210" fill="#403020"/>
    <polygon points="480,210 560,120  600,210" fill="#403020"/>
    <!-- snow caps -->
    <polygon points="75,115  80,110 85,115"  fill="white" opacity="0.7"/>
    <polygon points="193,87 200,80 207,87" fill="white" opacity="0.7"/>
    <polygon points="344,106 350,100 356,106" fill="white" opacity="0.7"/>
    <polygon points="473,77 480,70 487,77" fill="white" opacity="0.7"/>
  </g>
  <!-- crude stone texture overlay -->
  <g opacity="0.2" fill="#908060">
    <rect x="50" y="100" width="8" height="8"/>
    <rect x="70" y="120" width="10" height="6"/>
    <rect x="480" y="110" width="8" height="8"/>
    <rect x="510" y="130" width="10" height="7"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#908060" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#908060" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#908060" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#908060" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#908060" text-anchor="middle" filter="url(#glow)">Ogres</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#908060" text-anchor="middle" opacity="0.65">Oggok · Rallos Zek&#39;s Cursed</text>

</svg>
