<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0808"/>
      <stop offset="100%" stop-color="#1a1005"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
  <!-- jester hat -->
  <g transform="translate(300,120)" fill="#e8c040" opacity="0.8" filter="url(#glow)">
    <path d="M0,60 Q-60,40 -70,-10 Q-50,-60 0,-40 Z"/>
    <path d="M0,60 Q60,40 70,-10 Q50,-60 0,-40 Z"/>
    <path d="M0,-40 Q20,-100 0,-110 Q-20,-100 0,-40 Z"/>
    <!-- bells -->
    <circle cx="-68" cy="-12" r="12" fill="#e8c040"/>
    <circle cx="68"  cy="-12" r="12" fill="#e8c040"/>
    <circle cx="0"   cy="-108" r="12" fill="#e8c040"/>
    <circle cx="-68" cy="-12" r="5" fill="#a08000"/>
    <circle cx="68"  cy="-12" r="5" fill="#a08000"/>
    <circle cx="0"   cy="-108" r="5" fill="#a08000"/>
    <!-- collar -->
    <ellipse cx="0" cy="58" rx="50" ry="18" fill="#c84040"/>
  </g>
  <!-- playing card diamonds -->
  <g fill="#e8c040" opacity="0.5">
    <polygon points="120,70 140,95 120,120 100,95" />
    <polygon points="460,80 480,105 460,130 440,105" />
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#e8c040" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#e8c040" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#e8c040" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#e8c040" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#e8c040" text-anchor="middle" filter="url(#glow)">Bristlebane Fizzlethorpe</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#e8c040" text-anchor="middle" opacity="0.65">The King of Thieves · Plane of Mischief</text>

</svg>
