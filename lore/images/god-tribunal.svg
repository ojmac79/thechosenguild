  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#b0b0b0" text-anchor="middle" filter="url(#glow)">The Tribunal</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#b0b0b0" text-anchor="middle" opacity="0.65">The Six Hammers · Plane of Justice</text>

</svg>
