<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
  <!-- scales of justice -->
  <g transform="translate(300,130)" stroke="#c0c0c0" stroke-width="3" fill="none" opacity="0.75">
    <!-- central pole -->
    <line x1="0" y1="-90" x2="0" y2="50"/>
    <!-- balance beam -->
    <line x1="-120" y1="-40" x2="120" y2="-40"/>
    <!-- chains -->
    <line x1="-120" y1="-40" x2="-120" y2="10" stroke-dasharray="6 3"/>
    <line x1="120"  y1="-40" x2="120"  y2="10" stroke-dasharray="6 3"/>
    <!-- scale pans -->
    <path d="M-145,10 Q-120,25 -95,10 Z" fill="#909090" stroke="none" opacity="0.7"/>
    <path d="M95,10   Q120,25  145,10  Z" fill="#909090" stroke="none" opacity="0.7"/>
    <!-- top ornament -->
    <circle cx="0" cy="-92" r="12" fill="#b0b0b0" stroke="none" opacity="0.7"/>
    <!-- six rune marks -->
    <g fill="#c0c0c0" stroke="none" opacity="0.5">
      <circle cx="-90" cy="-70" r="5"/>
      <circle cx="-45" cy="-70" r="5"/>
      <circle cx="0"   cy="-70" r="5"/>
      <circle cx="45"  cy="-70" r="5"/>
      <circle cx="90"  cy="-70" r="5"/>
      <circle cx="0"   cy="-55" r="5"/>
    </g>
  </g>
    <circle cx="300" cy="130" r="80" fill="none" stroke="#808080" stroke-width="2.5" opacity="0.7"/>
  <circle cx="300" cy="130" r="88" fill="none" stroke="#808080" stroke-width="1" opacity="0.3"/>
  <circle cx="300" cy="130" r="55" fill="none" stroke="#808080" stroke-width="1.5" opacity="0.5" stroke-dasharray="6 4"/>
