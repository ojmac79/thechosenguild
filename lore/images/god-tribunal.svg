  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#b0b0b0" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#b0b0b0" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
