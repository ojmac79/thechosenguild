<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#050a00"/>
      <stop offset="100%" stop-color="#080f00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
  <!-- rolling green hills -->
  <g fill="#1a4010" opacity="0.7">
    <ellipse cx="120" cy="230" rx="160" ry="70"/>
    <ellipse cx="350" cy="240" rx="180" ry="65"/>
    <ellipse cx="560" cy="225" rx="130" ry="60"/>
  </g>
  <!-- hobbit holes -->
  <g fill="#5c3d1e" opacity="0.7">
    <ellipse cx="150" cy="200" rx="40" ry="22"/>
    <path d="M110,200 Q110,175 150,175 Q190,175 190,200 Z" fill="#2a5a10"/>
    <circle cx="170" cy="187" r="5" fill="#ffcc60" opacity="0.7"/>
    <ellipse cx="420" cy="210" rx="38" ry="20"/>
    <path d="M382,210 Q382,188 420,188 Q458,188 458,210 Z" fill="#2a5a10"/>
  </g>
    <g transform="translate(480,170)" opacity="0.85">
    <!-- trunk -->
    <rect x="-10" y="-20" width="20" height="60" fill="#5c3d1e"/>
    <!-- roots -->
    <path d="M-10,40 Q-30,55 -40,50" stroke="#5c3d1e" stroke-width="6" fill="none"/>
    <path d="M10,40 Q30,55 40,50" stroke="#5c3d1e" stroke-width="6" fill="none"/>
    <!-- canopy layers -->
    <ellipse cx="0" cy="-80" rx="90" ry="60" fill="#1a4010"/>
    <ellipse cx="0" cy="-110" rx="70" ry="50" fill="#1a4010"/>
    <ellipse cx="0" cy="-135" rx="50" ry="38" fill="#1a4010" opacity="0.9"/>
    <!-- light on leaves -->
    <ellipse cx="-20" cy="-90" rx="25" ry="18" fill="#4a7c30" opacity="0.6"/>
    <ellipse cx="25"  cy="-105" rx="20" ry="15" fill="#4a7c30" opacity="0.6"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#a0d050" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#a0d050" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#a0d050" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#a0d050" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#a0d050" text-anchor="middle" filter="url(#glow)">Halflings</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#a0d050" text-anchor="middle" opacity="0.65">Rivervale · The Misty Thicket</text>

</svg>
