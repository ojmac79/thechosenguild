<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#050c05"/>
      <stop offset="100%" stop-color="#081208"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,140)" fill="none" stroke="#1a4a1a" stroke-width="8" stroke-linecap="round" opacity="0.7">
    <path d="M0,0 Q-50,-30 -80,-80 Q-90,-100 -70,-120"/>
    <path d="M0,0 Q50,-30 80,-80 Q90,-100 70,-120"/>
    <path d="M0,0 Q-80,10 -120,40 Q-140,60 -130,90"/>
    <path d="M0,0 Q80,10 120,40 Q140,60 130,90"/>
    <path d="M0,0 Q-20,50 -30,90 Q-35,110 -15,130"/>
    <path d="M0,0 Q20,50 30,90 Q35,110 15,130"/>
    <path d="M0,0 Q0,-60 0,-100"/>
    <!-- eye cluster -->
    <circle cx="0" cy="-10" r="25" fill="#1a4a1a" stroke="none" opacity="0.5"/>
    <circle cx="-15" cy="-15" r="8" fill="red" stroke="none" opacity="0.7"/>
    <circle cx="15"  cy="-5"  r="8" fill="red" stroke="none" opacity="0.7"/>
  </g>
    <g transform="translate(300,100)" fill="#50c040" opacity="0.8" filter="url(#glow)">
    <!-- cranium -->
    <ellipse cx="0" cy="-20" rx="55" ry="55"/>
    <!-- jaw -->
    <rect x="-30" y="20" width="60" height="28" rx="5"/>
    <!-- eye sockets -->
    <ellipse cx="-18" cy="-25" rx="14" ry="16" fill="black" opacity="0.8"/>
    <ellipse cx="18"  cy="-25" rx="14" ry="16" fill="black" opacity="0.8"/>
    <!-- nose cavity -->
    <path d="M-7,0 L0,-10 L7,0 L3,10 L-3,10 Z" fill="black" opacity="0.7"/>
    <!-- teeth -->
    <rect x="-28" y="28" width="10" height="16" fill="black" opacity="0.4"/>
    <rect x="-14" y="28" width="10" height="18" fill="black" opacity="0.4"/>
    <rect x="0"   y="28" width="10" height="18" fill="black" opacity="0.4"/>
    <rect x="14"  y="28" width="10" height="16" fill="black" opacity="0.4"/>
  </g>
  <!-- fear mist -->
  <ellipse cx="300" cy="200" rx="250" ry="35" fill="#0a2a0a" opacity="0.6"/>
  <!-- fear eyes -->
  <g fill="red" opacity="0.7" filter="url(#glow)">
    <ellipse cx="120" cy="60"  rx="8" ry="5"/>
    <ellipse cx="480" cy="55"  rx="8" ry="5"/>
    <ellipse cx="80"  cy="140" rx="6" ry="4"/>
    <ellipse cx="520" cy="130" rx="6" ry="4"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#50b040" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#50b040" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#50b040" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#50b040" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#50b040" text-anchor="middle" filter="url(#glow)">Cazic-Thule</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#50b040" text-anchor="middle" opacity="0.65">The Faceless · Plane of Fear</text>

</svg>
