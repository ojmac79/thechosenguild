<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0c0010"/>
      <stop offset="100%" stop-color="#120018"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
  <!-- chains -->
  <g stroke="#9040c0" stroke-width="4" fill="none" opacity="0.65">
    <path d="M100,50 Q150,100 180,150 Q200,180 200,220" stroke-dasharray="12 6"/>
    <path d="M500,50 Q450,100 420,150 Q400,180 400,220" stroke-dasharray="12 6"/>
    <path d="M200,40 Q250,90 280,140 Q290,170 300,200" stroke-dasharray="12 6"/>
    <path d="M400,40 Q350,90 320,140 Q310,170 300,200" stroke-dasharray="12 6"/>
  </g>
  <!-- thorns -->
  <g fill="#9040c0" opacity="0.5">
    <polygon points="150,100 158,85 166,100"/>
    <polygon points="180,140 188,125 196,140"/>
    <polygon points="420,90 428,75 436,90"/>
    <polygon points="400,135 408,120 416,135"/>
  </g>
    <g transform="translate(300,115)" filter="url(#softglow)" opacity="0.85">
    <!-- outer eye -->
    <path d="M-130,0 Q0,-70 130,0 Q0,70 -130,0 Z" fill="none" stroke="#a050c0" stroke-width="3"/>
    <!-- iris -->
    <circle cx="0" cy="0" r="45" fill="#a050c0" opacity="0.3"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#a050c0" stroke-width="2"/>
    <!-- pupil -->
    <circle cx="0" cy="0" r="22" fill="black" opacity="0.8"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#a050c0" stroke-width="1.5"/>
    <!-- iris detail -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#a050c0" stroke-width="0.8" stroke-dasharray="4 4"/>
    <!-- highlight -->
    <circle cx="-10" cy="-10" r="7" fill="white" opacity="0.4"/>
    <!-- emanating lines -->
    <g stroke="#a050c0" stroke-width="1" opacity="0.4">
      <line x1="0" y1="-60" x2="0" y2="-90"/>
      <line x1="0" y1="60"  x2="0" y2="90"/>
      <line x1="-60" y1="0" x2="-90" y2="0"/>
      <line x1="60"  y1="0" x2="90"  y2="0"/>
      <line x1="-42" y1="-42" x2="-63" y2="-63"/>
      <line x1="42"  y1="-42" x2="63"  y2="-63"/>
      <line x1="-42" y1="42"  x2="-63" y2="63"/>
      <line x1="42"  y1="42"  x2="63"  y2="63"/>
    </g>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#c050e0" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#c050e0" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#c050e0" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#c050e0" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#c050e0" text-anchor="middle" filter="url(#glow)">Saryrn</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#c050e0" text-anchor="middle" opacity="0.65">The Mistress of Pain · Plane of Torment</text>

</svg>
