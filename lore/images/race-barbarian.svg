<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#030810"/>
      <stop offset="100%" stop-color="#040c14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g opacity="0.6">
    <polygon points="0,200 80,100 160,200" fill="#1a2a3a"/>
    <polygon points="100,200 200,70 300,200" fill="#1a2a3a"/>
    <polygon points="250,200 350,90 430,200" fill="#1a2a3a"/>
    <polygon points="380,200 480,60 580,200" fill="#1a2a3a"/>
    <polygon points="480,200 560,110  600,200" fill="#1a2a3a"/>
    <!-- snow caps -->
    <polygon points="75,105  80,100 85,105"  fill="white" opacity="0.7"/>
    <polygon points="193,77 200,70 207,77" fill="white" opacity="0.7"/>
    <polygon points="344,96 350,90 356,96" fill="white" opacity="0.7"/>
    <polygon points="473,67 480,60 487,67" fill="white" opacity="0.7"/>
  </g>
    <g transform="translate(300,115)" stroke="#80b0d0" stroke-width="4" fill="none" filter="url(#glow)" opacity="0.8">
    <!-- main arms -->
    <line x1="0" y1="-80" x2="0" y2="80"/>
    <line x1="-80" y1="0" x2="80" y2="0"/>
    <line x1="-56" y1="-56" x2="56" y2="56"/>
    <line x1="56" y1="-56" x2="-56" y2="56"/>
    <!-- branch decorations -->
    <line x1="-15" y1="-48" x2="0" y2="-40"/>
    <line x1="15"  y1="-48" x2="0" y2="-40"/>
    <line x1="-15" y1="48" x2="0" y2="40"/>
    <line x1="15"  y1="48" x2="0" y2="40"/>
    <line x1="-48" y1="-15" x2="-40" y2="0"/>
    <line x1="-48" y1="15" x2="-40" y2="0"/>
    <line x1="48" y1="-15" x2="40" y2="0"/>
    <line x1="48" y1="15" x2="40" y2="0"/>
    <!-- center -->
    <circle cx="0" cy="0" r="10" fill="#80b0d0" opacity="0.5"/>
  </g>
  <!-- snow/ice ground -->
  <rect x="0" y="220" width="600" height="60" fill="#1a2a3a" opacity="0.6"/>
  <!-- aurora borealis -->
  <g opacity="0.3">
    <path d="M0,60 Q150,20 300,50 Q450,80 600,40" fill="none" stroke="#40d080" stroke-width="10"/>
    <path d="M0,80 Q150,45 300,70 Q450,95 600,60" fill="none" stroke="#4080d0" stroke-width="6"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#90b8e0" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#90b8e0" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#90b8e0" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#90b8e0" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#90b8e0" text-anchor="middle" filter="url(#glow)">Barbarians</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#90b8e0" text-anchor="middle" opacity="0.65">Halas · Everfrost Peaks</text>

</svg>
