<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#120400"/>
      <stop offset="100%" stop-color="#1a0600"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,160)" filter="url(#softglow)">
    <!-- outer glow -->
    <ellipse cx="0" cy="10" rx="70" ry="25" fill="#ff9900" opacity="0.15"/>
    <!-- main flame shapes -->
    <path d="M0,30 Q-50,0 -30,-50 Q-10,-90 0,-120 Q15,-85 10,-40 Q30,-70 20,-110 Q45,-60 35,-20 Q55,-55 50,0 Q40,-20 20,30 Z"
          fill="#cc3000" opacity="0.9"/>
    <path d="M0,30 Q10,-10 5,-60 Q20,-45 15,30 Z" fill="#ff9900" opacity="0.7"/>
    <path d="M-10,30 Q-40,0 -20,-50 Q-5,-30 0,30 Z" fill="#ff9900" opacity="0.5"/>
    <!-- ember glow base -->
    <ellipse cx="0" cy="30" rx="50" ry="12" fill="#ff9900" opacity="0.35"/>
  </g>
  <!-- heat shimmer -->
  <radialGradient id="fireglow" cx="50%" cy="60%" r="45%">
    <stop offset="0%" stop-color="#ff6600" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="600" height="280" fill="url(#fireglow)"/>
    <g opacity="0.6">
    <polygon points="0,230 80,130 160,230" fill="#2a1205"/>
    <polygon points="100,230 200,100 300,230" fill="#2a1205"/>
    <polygon points="250,230 350,120 430,230" fill="#2a1205"/>
    <polygon points="380,230 480,90 580,230" fill="#2a1205"/>
    <polygon points="480,230 560,140  600,230" fill="#2a1205"/>
    <!-- snow caps -->
    <polygon points="75,135  80,130 85,135"  fill="white" opacity="0.7"/>
    <polygon points="193,107 200,100 207,107" fill="white" opacity="0.7"/>
    <polygon points="344,126 350,120 356,126" fill="white" opacity="0.7"/>
    <polygon points="473,97 480,90 487,97" fill="white" opacity="0.7"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#ff8030" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#ff8030" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#ff8030" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#ff8030" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#ff8030" text-anchor="middle" filter="url(#glow)">Solusek Ro</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#ff8030" text-anchor="middle" opacity="0.65">The Burning Prince · Plane of Sun</text>

</svg>
