<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#040a00"/>
      <stop offset="100%" stop-color="#070e00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
  <!-- rolling hills -->
  <g fill="#1a4010" opacity="0.7">
    <ellipse cx="100" cy="240" rx="180" ry="70"/>
    <ellipse cx="350" cy="250" rx="200" ry="65"/>
    <ellipse cx="580" cy="235" rx="150" ry="60"/>
  </g>
    <g transform="translate(100,175)" opacity="0.85">
    <!-- trunk -->
    <rect x="-10" y="-20" width="20" height="60" fill="#4a2a10"/>
    <!-- roots -->
    <path d="M-10,40 Q-30,55 -40,50" stroke="#4a2a10" stroke-width="6" fill="none"/>
    <path d="M10,40 Q30,55 40,50" stroke="#4a2a10" stroke-width="6" fill="none"/>
    <!-- canopy layers -->
    <ellipse cx="0" cy="-80" rx="90" ry="60" fill="#1a5015"/>
    <ellipse cx="0" cy="-110" rx="70" ry="50" fill="#1a5015"/>
    <ellipse cx="0" cy="-135" rx="50" ry="38" fill="#1a5015" opacity="0.9"/>
    <!-- light on leaves -->
    <ellipse cx="-20" cy="-90" rx="25" ry="18" fill="#4a7c30" opacity="0.6"/>
    <ellipse cx="25"  cy="-105" rx="20" ry="15" fill="#4a7c30" opacity="0.6"/>
  </g>
    <g transform="translate(500,180)" opacity="0.85">
    <!-- trunk -->
    <rect x="-10" y="-20" width="20" height="60" fill="#4a2a10"/>
    <!-- roots -->
    <path d="M-10,40 Q-30,55 -40,50" stroke="#4a2a10" stroke-width="6" fill="none"/>
    <path d="M10,40 Q30,55 40,50" stroke="#4a2a10" stroke-width="6" fill="none"/>
    <!-- canopy layers -->
    <ellipse cx="0" cy="-80" rx="90" ry="60" fill="#1a5015"/>
    <ellipse cx="0" cy="-110" rx="70" ry="50" fill="#1a5015"/>
    <ellipse cx="0" cy="-135" rx="50" ry="38" fill="#1a5015" opacity="0.9"/>
    <!-- light on leaves -->
    <ellipse cx="-20" cy="-90" rx="25" ry="18" fill="#4a7c30" opacity="0.6"/>
    <ellipse cx="25"  cy="-105" rx="20" ry="15" fill="#4a7c30" opacity="0.6"/>
  </g>
  <!-- hobbit holes in hillside -->
  <g fill="#5c3d1e" opacity="0.75">
    <path d="M200,230 Q200,200 230,200 Q260,200 260,230 Z" fill="#1a4010"/>
    <ellipse cx="230" cy="230" rx="32" ry="18"/>
    <circle cx="245" cy="218" r="5" fill="#ffcc60" opacity="0.7"/>
    <path d="M360,240 Q360,210 390,210 Q420,210 420,240 Z" fill="#1a4010"/>
    <ellipse cx="390" cy="240" rx="30" ry="17"/>
    <circle cx="405" cy="227" r="5" fill="#ffcc60" opacity="0.7"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#b0e060" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#b0e060" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#b0e060" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#b0e060" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#b0e060" text-anchor="middle" filter="url(#glow)">Rivervale</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#b0e060" text-anchor="middle" opacity="0.65">Halfling Homeland · Misty Thicket</text>

</svg>
