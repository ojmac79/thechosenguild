<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a00"/>
      <stop offset="100%" stop-color="#141200"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
    <g transform="translate(300,120)" fill="#c08020" opacity="0.8">
    <!-- large gear -->
    <circle cx="-30" cy="0" r="60" fill="none" stroke="#c08020" stroke-width="10"/>
    <circle cx="-30" cy="0" r="18" fill="#c08020"/>
    <!-- gear teeth large -->
    <rect x="-39" y="-75" width="18" height="20" rx="2"/>
    <rect x="-39" y="55" width="18" height="20" rx="2"/>
    <rect x="-95" y="-9" width="20" height="18" rx="2"/>
    <rect x="25"  y="-9" width="20" height="18" rx="2"/>
    <rect x="-82" y="-60" width="20" height="18" rx="2" transform="rotate(45 -72,-51)"/>
    <rect x="-82" y="42"  width="20" height="18" rx="2" transform="rotate(-45 -72,51)"/>
    <rect x="15"  y="-60" width="20" height="18" rx="2" transform="rotate(-45 25,-51)"/>
    <rect x="15"  y="42"  width="20" height="18" rx="2" transform="rotate(45 25,51)"/>
    <!-- small gear -->
    <circle cx="60" cy="-30" r="35" fill="none" stroke="#c08020" stroke-width="7"/>
    <circle cx="60" cy="-30" r="10" fill="#c08020"/>
    <rect x="51" y="-70" width="12" height="14" rx="2"/>
    <rect x="51" y="10"  width="12" height="14" rx="2"/>
    <rect x="21" y="-39" width="14" height="12" rx="2"/>
    <rect x="86" y="-39" width="14" height="12" rx="2"/>
  </g>
    <g opacity="0.6">
    <polygon points="0,210 80,110 160,210" fill="#3a3010"/>
    <polygon points="100,210 200,80 300,210" fill="#3a3010"/>
    <polygon points="250,210 350,100 430,210" fill="#3a3010"/>
    <polygon points="380,210 480,70 580,210" fill="#3a3010"/>
    <polygon points="480,210 560,120  600,210" fill="#3a3010"/>
    <!-- snow caps -->
    <polygon points="75,115  80,110 85,115"  fill="white" opacity="0.7"/>
    <polygon points="193,87 200,80 207,87" fill="white" opacity="0.7"/>
    <polygon points="344,106 350,100 356,106" fill="white" opacity="0.7"/>
    <polygon points="473,77 480,70 487,77" fill="white" opacity="0.7"/>
  </g>
  <!-- steam plumes -->
  <g fill="none" stroke="#d0d080" stroke-width="4" opacity="0.25">
    <path d="M120,180 Q110,150 120,120 Q130,95 120,70"/>
    <path d="M480,175 Q470,148 478,118 Q487,93 478,68"/>
  </g>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#ffd060" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#ffd060" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#ffd060" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#ffd060" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#ffd060" text-anchor="middle" filter="url(#glow)">Ak&#39;Anon</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#ffd060" text-anchor="middle" opacity="0.65">City of Clockwork Wonders · Steamfont Mtns</text>

</svg>
