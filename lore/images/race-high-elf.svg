<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#030810"/>
      <stop offset="100%" stop-color="#050c14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>
<rect width="600" height="280" fill="url(#bg)"/>
  <!-- elegant spire -->
  <g transform="translate(300,165)" fill="#2a4a6a" opacity="0.8">
    <rect x="-25" y="-100" width="50" height="120"/>
    <polygon points="-30,-100 0,-150 30,-100"/>
    <!-- windows -->
    <path d="M-10,-80 Q-10,-95 0,-95 Q10,-95 10,-80 Z" fill="#90c8f0" opacity="0.6"/>
    <path d="M-10,-50 Q-10,-65 0,-65 Q10,-65 10,-50 Z" fill="#90c8f0" opacity="0.6"/>
  </g>
  <!-- flanking towers -->
  <g fill="#2a4a6a" opacity="0.5">
    <rect x="165" y="130" width="30" height="80"/>
    <polygon points="165,130 180,100 195,130"/>
    <rect x="405" y="135" width="30" height="75"/>
    <polygon points="405,135 420,105 435,135"/>
  </g>
  <!-- celestial light -->
  <radialGradient id="elflight" cx="50%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#a0c8ff" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="600" height="280" fill="url(#elflight)"/>
  <rect x="6" y="6" width="588" height="268" fill="none" stroke="#d0e8ff" stroke-width="1" stroke-opacity="0.45" rx="6"/>
  <rect x="10" y="10" width="580" height="260" fill="none" stroke="#d0e8ff" stroke-width="0.5" stroke-opacity="0.23" rx="4"/>
  <g stroke="#d0e8ff" stroke-width="1.8" fill="none" stroke-opacity="0.7">
    <path d="M22,22 L22,40 M22,22 L40,22"/>
    <path d="M578,22 L578,40 M578,22 L560,22"/>
    <path d="M22,258 L22,240 M22,258 L40,258"/>
    <path d="M578,258 L578,240 M578,258 L560,258"/>
  </g>
  <line x1="80" y1="226" x2="520" y2="226" stroke="#d0e8ff" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="300" y="240" font-family="Georgia,serif" font-size="20" font-weight="bold"
        fill="#d0e8ff" text-anchor="middle" filter="url(#glow)">High Elves — Koada&#39;Dal</text>
  <text x="300" y="260" font-family="Georgia,serif" font-size="12"
        fill="#d0e8ff" text-anchor="middle" opacity="0.65">City of Felwithe · Faydwer</text>

</svg>
