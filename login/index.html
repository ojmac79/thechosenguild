<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Chosen — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <div class="chosen-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="brand" href="/">
            <span class="brand__sigil" aria-hidden="true">✦</span>
            <span class="brand__text">
              <span class="brand__name">The Chosen</span>
              <span class="brand__sub">EverQuest Legends</span>
            </span>
          </a>
          <nav class="site-nav" aria-label="Primary">
            <a class="site-nav__link" href="/">News</a>
            <a class="site-nav__link" href="/forums/">Forums</a>
            <a class="site-nav__link" href="/roster/">Roster</a>
            <a class="site-nav__link" href="/discord/">Discord</a>
            <a class="site-nav__link" href="/resources/">Resources</a>
          </nav>
          <div class="site-header__auth">
            <a class="btn-torch active" href="/login/">Enter the Hall</a>
          </div>
        </div>
      </header>

      <main class="page">
        <div class="panel gate">
          <p class="hero__eyebrow">Members Only</p>
          <h1 class="page-title">Enter the Hall</h1>
          <p>Only sworn members of The Chosen may pass beyond this gate.</p>
          <div class="tab-row">
            <button class="tab-btn active">Log In</button>
            <button class="tab-btn">Join</button>
          </div>
          <form>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="you@example.com" />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input id="password" type="password" placeholder="••••••••" />
            </div>
            <button class="btn-primary" type="submit">Log In</button>
          </form>
        </div>
      </main>

      <footer class="site-footer">
        <p>The Chosen — forged in the fires of Norrath. Guild hall maintained by the officer council.</p>
      </footer>
    </div>
  </body>
</html>
